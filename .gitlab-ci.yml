include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/rust-cli@v2.3.0
    inputs:
      binary_name: sysml
      project_description: "CLI-native knowledge graph toolkit for SysML v2."
      audit_allow_failure: false
      crates_publish: false  # workspace needs ordered publish, see below

stages: [test, build, sign, publish, release]

default:
  tags: [storr]
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# Workspace crates must be published in dependency order.
# nomograph-sysml-core first, then nomograph-sysml (which depends on it).
crates:
  stage: publish
  image: ${NOMOGRAPH_REGISTRY:-registry.gitlab.com/nomograph/pipeline}/rust-cli:latest
  interruptible: false
  needs:
    - job: check
      artifacts: false
    - job: audit
      artifacts: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - cargo publish -p nomograph-sysml-core --no-verify
    - sleep 15
    - cargo publish -p nomograph-sysml --no-verify
