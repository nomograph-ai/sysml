stages:
  - test
  - publish

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

default:
  image: rust:1.85
  tags:
    - storr

cache:
  key: rust-${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry/
    - target/

# ============================================================================
# Test Stage
# ============================================================================

build:
  stage: test
  script:
    - cargo build --workspace
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  script:
    - cargo test --workspace
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

clippy:
  stage: test
  script:
    - rustup component add clippy
    - cargo clippy --workspace -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ============================================================================
# Publish Stage — triggered by version tags (v*)
# ============================================================================

publish-crates:
  stage: publish
  script:
    - cargo publish -p nomograph-core --no-verify
    - sleep 15
    - cargo publish -p sysml-core --no-verify
    - sleep 15
    - cargo publish -p sysml-cli --no-verify
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
